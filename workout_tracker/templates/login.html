{% extends "base.html" %}
{% block content %}
<div class="card" style="margin-top: 100px;">
    <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn-primary" style="margin-top: 15px;">Enter Tracker</button>
    </form>
    <a href="{% url 'signup' %}" style="color: var(--accent-blue); display: block; text-align: center; margin-top: 20px; text-decoration: none;">New? Sign Up Here</a>
</div>

<script>
    localStorage.removeItem('workoutSession');
</script>
{% endblock %}
