<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    <style>
        :root {
            /* Pure Monochromatic Canvas */
            --bg-pure-black: #000000;
            --bg-card: #121212;
            --bg-item: #1A1A1A;
            --border-subtle: #333333;
            --border-focus: #666666;
            
            /* Typography */
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --text-dark: #000000;
        }

        body { background: var(--bg-pure-black); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; padding-bottom: 80px; margin: 0; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-subtle); }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border-subtle); background: var(--bg-item); color: var(--text-main); font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--text-main); }
        
        button { cursor: pointer; font-weight: bold; border: none; }
        
        /* Monochromatic Buttons */
        .btn-primary { background: var(--bg-item); border: 1px solid var(--border-focus); color: var(--text-main); }
        .btn-success { background: var(--text-main); color: var(--text-dark); } /* High contrast white for main actions */
        .btn-warning { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
        .btn-danger { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); }
        .btn-neutral { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-muted); }
        
        .flex { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
